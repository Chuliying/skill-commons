name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify repository
        run: bash tests/run-all.sh

  bash-32-compat:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Record system Bash
        run: /bin/bash --version

      - name: Verify generate safety with system Bash
        run: PATH=/usr/bin:/bin /bin/bash tests/bootstrap/test_generate_safety.sh

      - name: Verify lifecycle management with system Bash
        run: PATH=/usr/bin:/bin /bin/bash tests/bootstrap/test_manage.sh

      - name: Verify onboarding with system Bash
        run: PATH=/usr/bin:/bin /bin/bash tests/bootstrap/test_onboard.sh
